<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI im Mittelstand – Leitfaden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #ffffff;
            --bg-page-alt: #faf9f7;
            --bg-cover: #151416;
            --bg-chapter: #151416;
            --accent: #FC2D01;
            --accent-soft: #fef5f3;
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --text-on-dark: #ffffff;
            --text-on-dark-muted: #CFCAB4;
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --box-accent-bg: #fef5f3;
            --box-accent-border: #FC2D01;
            --box-subtle-bg: #f7f7f6;
            --box-subtle-border: #ddd;
            --table-header-bg: #151416;
            --table-header-text: #ffffff;
            --table-row-hover: #faf9f7;
        }

        /* ===================================================
           Fluid Typography – kalibriert auf 900px eff. Viewport
           min = bisherige fixe Größe (nie kleiner)
           vh  = bei 900px identisch, darüber wächst's
           max = obere Grenze für sehr große Screens
           =================================================== */

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans', sans-serif;
            font-weight: 400; font-size: clamp(15px, 1.65vh, 20px); line-height: 1.65;
            color: var(--text-primary);
            background-color: var(--bg-page-alt);
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .book-container {
            height: calc(100vh - 80px);
            width: calc((100vh - 80px) * 1.5);
            max-width: 100vw;
            background: var(--bg-page);
            box-shadow: 0 4px 40px rgba(0,0,0,0.08);
            border-radius: 6px; overflow: hidden;
        }
        .book-spread { display: flex; height: 100%; }
        .book-page {
            flex: 1; height: 100%;
            padding: clamp(36px, 4.4vh, 56px) clamp(32px, 4vh, 52px) clamp(48px, 6vh, 76px);
            overflow: hidden; position: relative;
            background: var(--bg-page);
            display: flex; flex-direction: column;
            justify-content: center;
        }
        .page-inner { width: 100%; }
        .book-page.left { border-right: 1px solid var(--border-light); }
        .book-page.right { background: var(--bg-page-alt); }

        /* --- Fluid Typography --- */
        h1 { font-weight: 900; font-size: clamp(28px, 3.5vh, 44px); line-height: 1.15; color: var(--text-primary); margin-bottom: clamp(0.8rem, 1.1vh, 1.4rem); }
        h2 { font-weight: 800; font-size: clamp(22px, 2.7vh, 34px); line-height: 1.2; color: var(--text-primary); margin: clamp(1rem, 1.4vh, 1.8rem) 0 clamp(0.5rem, 0.8vh, 1.1rem); }
        h2:first-child { margin-top: 0; }
        h3 { font-weight: 700; font-size: clamp(16px, 2vh, 25px); line-height: 1.3; color: var(--text-primary); margin: clamp(0.9rem, 1.2vh, 1.6rem) 0 clamp(0.4rem, 0.6vh, 0.8rem); }
        h4 { font-weight: 700; font-size: clamp(14px, 1.7vh, 21px); line-height: 1.35; color: var(--text-primary); margin: clamp(0.6rem, 0.9vh, 1.2rem) 0 clamp(0.2rem, 0.4vh, 0.5rem); }
        .subline { font-family: 'Instrument Serif', serif; font-size: clamp(16px, 2vh, 25px); font-weight: 400; color: var(--text-secondary); line-height: 1.45; }
        p { margin-bottom: clamp(0.6rem, 0.8vh, 1.1rem); color: var(--text-secondary); font-size: clamp(14px, 1.65vh, 20px); line-height: 1.65; }
        strong { font-weight: 700; color: var(--text-primary); }
        a { color: var(--accent); text-decoration: none; }
        .accent { color: var(--accent); }
        ul, ol { margin: clamp(0.5rem, 0.8vh, 1.1rem) 0; padding-left: clamp(1.2rem, 1.6vh, 2rem); color: var(--text-secondary); font-size: clamp(14px, 1.65vh, 20px); }
        li { margin-bottom: clamp(0.2rem, 0.35vh, 0.5rem); line-height: 1.55; }
        li strong { color: var(--text-primary); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; font-size: clamp(13px, 1.55vh, 19px); }
        th { background: var(--table-header-bg); color: var(--table-header-text); padding: clamp(7px, 0.9vh, 12px) clamp(10px, 1.3vh, 18px); text-align: left; font-weight: 700; font-size: clamp(11px, 1.25vh, 15px); text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: clamp(7px, 0.9vh, 12px) clamp(10px, 1.3vh, 18px); border-bottom: 1px solid var(--border-light); color: var(--text-secondary); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--table-row-hover); }

        /* Monochrome Boxes */
        .highlight-box {
            background: var(--box-accent-bg); border-left: 3px solid var(--box-accent-border);
            padding: clamp(0.8rem, 1.1vh, 1.4rem) clamp(1rem, 1.2vh, 1.6rem);
            margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; border-radius: 0 5px 5px 0;
        }
        .highlight-box h4 { color: var(--accent); margin-top: 0; margin-bottom: clamp(0.2rem, 0.35vh, 0.5rem); font-size: clamp(14px, 1.65vh, 20px); }
        .highlight-box p { font-size: clamp(13px, 1.55vh, 19px); margin-bottom: clamp(0.3rem, 0.45vh, 0.6rem); }
        .highlight-box p:last-child { margin-bottom: 0; }
        .highlight-box ul { font-size: clamp(13px, 1.55vh, 19px); margin: clamp(0.3rem, 0.45vh, 0.6rem) 0; }
        .highlight-box li { margin-bottom: clamp(0.1rem, 0.25vh, 0.35rem); }

        .tip-box {
            background: var(--box-subtle-bg); border: 1px solid var(--box-subtle-border);
            padding: clamp(0.8rem, 1.1vh, 1.4rem) clamp(1rem, 1.2vh, 1.6rem);
            margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; border-radius: 5px;
        }
        .tip-box h4 { color: var(--text-primary); margin-top: 0; margin-bottom: clamp(0.2rem, 0.35vh, 0.5rem); font-size: clamp(14px, 1.65vh, 20px); }
        .tip-box p { font-size: clamp(13px, 1.55vh, 19px); margin-bottom: clamp(0.3rem, 0.45vh, 0.6rem); }
        .tip-box p:last-child { margin-bottom: 0; }

        .warning-box {
            background: var(--box-subtle-bg); border: 1px solid var(--box-subtle-border);
            border-left: 3px solid var(--text-muted);
            padding: clamp(0.8rem, 1.1vh, 1.4rem) clamp(1rem, 1.2vh, 1.6rem);
            margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; border-radius: 0 5px 5px 0;
        }
        .warning-box h4 { color: var(--text-primary); margin-top: 0; margin-bottom: clamp(0.2rem, 0.35vh, 0.5rem); font-size: clamp(14px, 1.65vh, 20px); font-weight: 800; }
        .warning-box p { font-size: clamp(13px, 1.55vh, 19px); margin-bottom: clamp(0.3rem, 0.45vh, 0.6rem); }
        .warning-box p:last-child { margin-bottom: 0; }

        .definition-box {
            background: var(--box-subtle-bg);
            padding: clamp(0.8rem, 1.1vh, 1.4rem) clamp(1rem, 1.2vh, 1.6rem);
            margin: clamp(0.8rem, 1.1vh, 1.4rem) 0;
            border-radius: 5px; font-style: italic; font-size: clamp(14px, 1.65vh, 20px); color: var(--text-secondary);
        }
        .definition-box strong { font-style: normal; color: var(--text-primary); }

        .quote-box {
            background: var(--box-accent-bg); border-left: 3px solid var(--box-accent-border);
            padding: clamp(0.9rem, 1.2vh, 1.5rem) clamp(1.1rem, 1.4vh, 1.8rem);
            margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; border-radius: 0 5px 5px 0;
        }
        .quote-box blockquote { font-family: 'Instrument Serif', serif; font-size: clamp(17px, 2.1vh, 27px); line-height: 1.4; color: var(--text-primary); margin-bottom: clamp(0.3rem, 0.45vh, 0.6rem); }
        .quote-box cite { font-family: 'Noto Sans', sans-serif; font-size: clamp(12px, 1.35vh, 17px); color: var(--text-muted); font-style: normal; }

        /* Cover */
        .page-cover {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: var(--bg-cover); color: var(--text-on-dark);
            padding: clamp(32px, 4.4vh, 56px);
        }
        .page-cover h1 { color: var(--text-on-dark); font-size: clamp(34px, 4.2vh, 52px); margin-bottom: clamp(0.4rem, 0.65vh, 0.9rem); }
        .page-cover .subline { color: var(--text-on-dark-muted); font-size: clamp(19px, 2.3vh, 29px); margin-bottom: clamp(1rem, 1.4vh, 1.8rem); }
        .page-cover .cover-description { color: var(--text-on-dark-muted); font-size: clamp(14px, 1.65vh, 20px); max-width: 400px; line-height: 1.65; margin-bottom: clamp(1.5rem, 2.2vh, 3rem); }
        .page-cover .cover-meta { font-size: clamp(12px, 1.35vh, 17px); color: var(--text-on-dark-muted); opacity: 0.6; }
        .accent-bar { width: clamp(36px, 4.4vh, 56px); height: 3px; background: var(--accent); margin: clamp(0.8rem, 1.1vh, 1.4rem) auto; border-radius: 2px; }

        /* Chapter Opener */
        .chapter-opener {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center;
            background: var(--bg-chapter); color: var(--text-on-dark);
            padding: clamp(32px, 4.4vh, 56px);
        }
        .chapter-opener .chapter-number { font-weight: 900; font-size: clamp(60px, 7.5vh, 96px); color: var(--accent); line-height: 1; margin-bottom: clamp(0.4rem, 0.65vh, 0.9rem); }
        .chapter-opener h2 { color: var(--text-on-dark); font-size: clamp(26px, 3.2vh, 40px); margin: 0 0 clamp(0.4rem, 0.65vh, 0.9rem); }
        .chapter-opener .subline { color: var(--text-on-dark-muted); font-size: clamp(15px, 1.8vh, 23px); }
        .chapter-opener .accent-bar { margin: clamp(0.8rem, 1.1vh, 1.4rem) 0; }

        /* Summary */
        .summary-box {
            background: var(--box-accent-bg); border: 1.5px solid var(--box-accent-border); border-radius: 6px;
            padding: clamp(0.9rem, 1.2vh, 1.5rem); margin: clamp(0.8rem, 1.1vh, 1.4rem) 0;
        }
        .summary-box h3 { color: var(--accent); margin-top: 0; font-size: clamp(16px, 1.9vh, 24px); margin-bottom: clamp(0.4rem, 0.65vh, 0.9rem); }
        .takeaway-item { display: flex; gap: clamp(8px, 0.9vh, 12px); align-items: flex-start; margin-bottom: clamp(0.4rem, 0.65vh, 0.9rem); }
        .takeaway-number { font-weight: 900; font-size: clamp(18px, 2.2vh, 28px); color: var(--accent); min-width: clamp(22px, 2.6vh, 34px); }
        .takeaway-text { color: var(--text-secondary); line-height: 1.5; font-size: clamp(13px, 1.55vh, 19px); }
        .takeaway-text strong { color: var(--text-primary); }

        /* Back Cover */
        .page-back-cover {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: var(--bg-cover); color: var(--text-on-dark);
            padding: clamp(32px, 4.4vh, 56px);
        }
        .page-back-cover h2 { color: var(--text-on-dark); margin-bottom: clamp(0.4rem, 0.65vh, 0.9rem); font-size: clamp(22px, 2.7vh, 34px); }
        .page-back-cover p { color: var(--text-on-dark-muted); max-width: 380px; font-size: clamp(14px, 1.65vh, 20px); }
        .cta-link {
            display: inline-block; margin-top: clamp(1rem, 1.4vh, 1.8rem);
            padding: clamp(10px, 1.1vh, 16px) clamp(22px, 2.6vh, 36px);
            background: var(--accent); color: #fff; font-weight: 700;
            font-size: clamp(14px, 1.65vh, 20px); border-radius: 5px;
            text-decoration: none; transition: opacity 0.2s;
        }
        .cta-link:hover { opacity: 0.9; text-decoration: none; }

        /* Footer */
        .page-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: clamp(10px, 1.3vh, 18px) clamp(32px, 4vh, 52px);
            display: flex; justify-content: space-between; align-items: center;
        }
        .footer-brand { font-weight: 900; font-size: clamp(12px, 1.35vh, 17px); }
        .footer-brand .rl { color: var(--text-muted); }
        .footer-brand .dot { color: var(--accent); }
        .page-number { font-size: clamp(11px, 1.25vh, 15px); font-weight: 600; color: var(--text-muted); }

        /* Nav */
        .navigation {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
            background: var(--bg-page); padding: 7px 18px; border-radius: 50px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.1); border: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; z-index: 1000;
        }
        .nav-btn {
            background: var(--accent); color: #fff; border: none;
            padding: 6px 14px; border-radius: 25px; cursor: pointer;
            font-family: 'Noto Sans', sans-serif; font-size: 11px; font-weight: 600;
            transition: opacity 0.2s, transform 0.2s;
        }
        .nav-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .nav-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }
        .page-info { font-size: 11px; color: var(--text-muted); font-weight: 500; min-width: 100px; text-align: center; }

        .progress-bar { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: var(--border-light); z-index: 1001; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

        @media (max-width: 768px) {
            body { height: auto; overflow: auto; padding: 0 0 70px; }
            .book-container { height: auto; width: 100%; border-radius: 0; box-shadow: none; }
            .book-spread { flex-direction: column; height: auto; }
            .book-page { height: auto; min-height: 85vh; padding: 28px 20px 52px; overflow: visible; }
            .book-page.left { border-right: none; border-bottom: 1px solid var(--border-light); }
            .page-cover, .chapter-opener, .page-back-cover { position: relative; min-height: 85vh; }
            .navigation { padding: 5px 12px; gap: 8px; }
            .nav-btn { padding: 5px 10px; font-size: 10px; }
            .page-info { font-size: 10px; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="book-container"><div class="book-spread" id="bookSpread"></div></div>
    <div class="navigation">
        <button class="nav-btn" id="prevBtn" onclick="prevSpread()">◀ Zurück</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="nav-btn" id="nextBtn" onclick="nextSpread()">Weiter ▶</button>
    </div>

    <script>
        const totalPages = 8;
        let currentSpread = 0;
        const logoHTML = '<span class="rl">RL</span><span class="dot">.</span>';

        const pageContent = [
            {
                left: `
                    <div class="page-cover">
                        <h1>KI im Mittelstand</h1>
                        <div class="accent-bar"></div>
                        <p class="subline">Ein Leitfaden für Entscheider</p>
                        <p class="cover-description">Wie mittelständische Unternehmen KI-Technologien strategisch einsetzen, ohne sich in Hype-Zyklen zu verlieren.</p>
                        <div class="cover-meta"><p>loschke.ai · März 2026</p></div>
                    </div>
                `,
                right: `
                    <h1>Inhaltsverzeichnis</h1>
                    <div class="highlight-box">
                        <h4>Was Sie erwartet</h4>
                        <ul>
                            <li>Wo KI im Mittelstand tatsächlich Wert schafft</li>
                            <li>Welche Voraussetzungen erfüllt sein müssen</li>
                            <li>Wie Sie den Einstieg strukturieren</li>
                        </ul>
                    </div>
                    <table>
                        <tr><th>Kapitel</th><th>Thema</th><th>Seite</th></tr>
                        <tr><td><strong>1</strong></td><td>Wo KI wirklich hilft</td><td>3–4</td></tr>
                        <tr><td><strong>2</strong></td><td>Voraussetzungen und erste Schritte</td><td>5–6</td></tr>
                        <tr><td></td><td>Zusammenfassung & Ausblick</td><td>7–8</td></tr>
                    </table>
                `,
                leftType: 'cover', rightType: 'content'
            },
            {
                left: `
                    <div class="chapter-opener">
                        <div class="chapter-number">01</div>
                        <div class="accent-bar"></div>
                        <h2>Wo KI wirklich hilft</h2>
                        <p class="subline">Jenseits der Marketing-Versprechen</p>
                    </div>
                `,
                right: `
                    <h2>Die Realität hinter dem Hype</h2>
                    <p>Die meisten KI-Projekte im Mittelstand scheitern nicht an der Technologie. Sie scheitern an falschen Erwartungen. Wer glaubt, ein Chatbot werde den gesamten Kundenservice ersetzen, hat das Problem nicht verstanden.</p>

                    <div class="definition-box">
                        <strong>Operativer KI-Einsatz:</strong> Der Einsatz von KI-Werkzeugen zur Beschleunigung bestehender Prozesse – nicht zur Erfindung neuer Geschäftsmodelle.
                    </div>

                    <h3>Drei Bereiche mit echtem ROI</h3>
                    <ul>
                        <li><strong>Dokumentenverarbeitung:</strong> Rechnungen, Verträge, E-Mails – strukturierte Extraktion spart 60–80% manuelle Arbeit</li>
                        <li><strong>Wissensmanagement:</strong> Internes Wissen durchsuchbar machen, statt es in einzelnen Köpfen zu lagern</li>
                        <li><strong>Qualitätssicherung:</strong> Visuelle Inspektion, Anomalie-Erkennung, Prozessabweichungen automatisch flaggen</li>
                    </ul>

                    <div class="warning-box">
                        <h4>Häufiger Fehler</h4>
                        <p>Mit dem spannendsten statt dem einfachsten Use Case anfangen. Starten Sie dort, wo Daten bereits digital vorliegen.</p>
                    </div>
                `,
                leftType: 'chapter', rightType: 'content'
            },
            {
                left: `
                    <div class="chapter-opener">
                        <div class="chapter-number">02</div>
                        <div class="accent-bar"></div>
                        <h2>Voraussetzungen</h2>
                        <p class="subline">Was stimmen muss, bevor Sie starten</p>
                    </div>
                `,
                right: `
                    <h2>Vier Grundlagen für KI-Readiness</h2>
                    <p>Bevor Sie in Tools investieren, prüfen Sie diese vier Dimensionen. Jede einzelne kann ein KI-Projekt zum Scheitern bringen.</p>

                    <table>
                        <tr><th>Dimension</th><th>Prüffrage</th></tr>
                        <tr><td><strong>Daten</strong></td><td>Liegen Ihre Daten digital und zugänglich vor?</td></tr>
                        <tr><td><strong>Prozesse</strong></td><td>Sind die Ziel-Prozesse dokumentiert?</td></tr>
                        <tr><td><strong>Menschen</strong></td><td>Gibt es einen internen Champion?</td></tr>
                        <tr><td><strong>Kultur</strong></td><td>Darf gescheitert werden?</td></tr>
                    </table>

                    <div class="tip-box">
                        <h4>Praxis-Empfehlung</h4>
                        <p>Starten Sie mit einem <strong>Pilot-Projekt unter 10.000€</strong> und maximal 8 Wochen Laufzeit. Ziel: Einen messbaren Prozess beschleunigen.</p>
                    </div>

                    <div class="quote-box">
                        <blockquote>Die beste KI-Strategie ist eine, die ohne KI funktioniert – und mit KI schneller wird.</blockquote>
                        <cite>— Prinzip aus der Beratungspraxis</cite>
                    </div>
                `,
                leftType: 'chapter', rightType: 'content'
            },
            {
                left: `
                    <h2>Zusammenfassung</h2>
                    <div class="summary-box">
                        <h3>Drei Dinge zum Mitnehmen</h3>
                        <div class="takeaway-item">
                            <span class="takeaway-number">1</span>
                            <span class="takeaway-text"><strong>Klein anfangen, schnell messen.</strong> Der erste Use-Case soll in Wochen Ergebnisse liefern, nicht in Quartalen.</span>
                        </div>
                        <div class="takeaway-item">
                            <span class="takeaway-number">2</span>
                            <span class="takeaway-text"><strong>Daten vor Tools.</strong> Ohne saubere, zugängliche Daten hilft das beste KI-Werkzeug nichts.</span>
                        </div>
                        <div class="takeaway-item">
                            <span class="takeaway-number">3</span>
                            <span class="takeaway-text"><strong>Menschen einbinden.</strong> KI verändert, wie Mitarbeiter arbeiten. Das braucht Begleitung.</span>
                        </div>
                    </div>
                    <div class="tip-box">
                        <h4>Nächster Schritt</h4>
                        <p>Identifizieren Sie diese Woche einen Prozess, der repetitiv, datenbasiert und dokumentiert ist. Das ist Ihr Startpunkt.</p>
                    </div>
                `,
                right: `
                    <div class="page-back-cover">
                        <h2>Bereit loszulegen?</h2>
                        <div class="accent-bar"></div>
                        <p>Lassen Sie uns klären, wo KI in Ihrem Unternehmen den größten Hebel hat.</p>
                        <a href="https://loschke.ai" class="cta-link">Erstgespräch vereinbaren</a>
                        <div class="cover-meta" style="margin-top: clamp(1.5rem, 2.2vh, 3rem);"><p>Rico Loschke · loschke.ai</p></div>
                    </div>
                `,
                leftType: 'content', rightType: 'back-cover'
            }
        ];

        function makeFooter(num, type) {
            if (type === 'cover' || type === 'back-cover') return '';
            const dark = type === 'chapter';
            return `<div class="page-footer"${dark ? ' style="opacity:0.35;"' : ''}>
                <div class="footer-brand">${logoHTML}</div>
                <div class="page-number">${num}</div>
            </div>`;
        }

        function updateContent() {
            const s = pageContent[currentSpread];
            const lp = currentSpread * 2 + 1, rp = currentSpread * 2 + 2;
            const lt = s.leftType || 'content', rt = s.rightType || 'content';
            const wrapL = (lt === 'content') ? `<div class="page-inner">${s.left}</div>` : s.left;
            const wrapR = (rt === 'content') ? `<div class="page-inner">${s.right}</div>` : s.right;
            document.getElementById('bookSpread').innerHTML = `
                <div class="book-page left">${wrapL}${makeFooter(lp, lt)}</div>
                <div class="book-page right">${wrapR}${makeFooter(rp, rt)}</div>`;
            updateNav(); updateProgress();
        }

        function updateNav() {
            const lp = currentSpread * 2 + 1, rp = Math.min(currentSpread * 2 + 2, totalPages);
            document.getElementById('pageInfo').textContent = `Seite ${lp}–${rp} von ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentSpread === 0;
            document.getElementById('nextBtn').disabled = currentSpread >= Math.ceil(totalPages / 2) - 1;
        }

        function updateProgress() {
            document.getElementById('progressFill').style.width = ((currentSpread + 1) / Math.ceil(totalPages / 2) * 100) + '%';
        }

        function prevSpread() { if (currentSpread > 0) { currentSpread--; updateContent(); } }
        function nextSpread() { if (currentSpread < Math.ceil(totalPages / 2) - 1) { currentSpread++; updateContent(); } }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') prevSpread();
            if (e.key === 'ArrowRight') nextSpread();
            if (e.key === 'Home') { currentSpread = 0; updateContent(); }
            if (e.key === 'End') { currentSpread = Math.ceil(totalPages / 2) - 1; updateContent(); }
        });

        updateContent();
    </script>
</body>
</html>
