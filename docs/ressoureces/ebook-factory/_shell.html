<!-- ==========================================
     SHELL TEMPLATE – Ebook Factory
     
     Dieses Template bildet die Grundstruktur jeder Ebook-HTML-Datei.
     
     Verwendung:
     1. Komplettes Template kopieren
     2. [TITLE] ersetzen
     3. Brand-CSS-Variablen aus _brands.css in :root einsetzen
     4. Gesamtes CSS aus _base.css in <style> einbetten
     5. pageContent-Array mit Spreads befüllen
     6. totalPages auf korrekte Seitenzahl setzen
     7. Logo-HTML im Footer anpassen
     8. [PDF_FILENAME] im exportPDF() ersetzen
     ========================================== -->

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[TITLE]</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Noto+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* === Brand Variables === */
        :root {
            /* [BRAND-VARIABLEN HIER EINSETZEN – aus _brands.css] */
        }
        
        /* === Base CSS === */
        /* [GESAMTES _base.css HIER EINBETTEN] */
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Book -->
    <div class="book-container">
        <div class="book-spread" id="bookSpread"></div>
    </div>

    <!-- Navigation -->
    <div class="navigation">
        <button class="nav-btn" id="prevBtn" onclick="prevSpread()">◀ Zurück</button>
        <span class="page-info" id="pageInfo"></span>
        <button class="nav-btn" id="nextBtn" onclick="nextSpread()">Weiter ▶</button>
        <span style="color:var(--border);padding:0 4px;">|</span>
        <button class="nav-btn" id="pdfBtn" onclick="exportPDF()" style="background:var(--text-muted);font-size:10px;">PDF ↓</button>
        <span id="exportStatus" style="font-size:10px;color:var(--text-muted);min-width:30px;"></span>
    </div>

    <script>
        // === Configuration ===
        const totalPages = 0; // [SEITENZAHL SETZEN]
        let currentSpread = 0;

        // === Page Content ===
        // Jeder Spread hat left + right.
        // Footer wird automatisch eingefügt (außer bei Cover/Chapter-Opener/Back-Cover).
        const pageContent = [
            // [SPREADS HIER EINFÜGEN]
            // Beispiel:
            // {
            //     left: `<div class="page-cover">...</div>`,
            //     right: `<h1>Inhaltsverzeichnis</h1>...`,
            //     leftType: 'cover',   // 'cover' | 'chapter' | 'back-cover' | 'content'
            //     rightType: 'content' // Steuert Footer-Verhalten
            // }
        ];

        // === Logo HTML (Brand-spezifisch) ===
        // loschke.ai:
        const logoHTML = '<span class="rl">RL</span><span class="dot">.</span>';
        // unlearn.how:
        // const logoHTML = '<span class="brand-name">unlearn</span><span class="brand-ext">.how</span>';
        // lernen.diy:
        // const logoHTML = '<span class="brand-name">lernen</span><span class="brand-ext">.diy</span>';
        
        // Logo-CSS-Klasse
        const logoClass = ''; // '' für loschke.ai, 'logo-unlearn', 'logo-lernen'

        // === Footer Generation ===
        function makeFooter(pageNum, type) {
            if (type === 'cover' || type === 'back-cover') return '';
            const darkFooter = type === 'chapter';
            return `
                <div class="page-footer" ${darkFooter ? 'style="color: var(--text-on-dark-muted);"' : ''}>
                    <div class="footer-brand ${logoClass}" ${darkFooter ? 'style="opacity:0.5;"' : ''}>
                        ${logoHTML}
                    </div>
                    <div class="page-number" ${darkFooter ? 'style="color: var(--text-on-dark-muted);"' : ''}>
                        ${pageNum}
                    </div>
                </div>`;
        }

        // === Render ===
        function updateContent() {
            const spread = pageContent[currentSpread];
            const leftPage = (currentSpread * 2) + 1;
            const rightPage = (currentSpread * 2) + 2;
            
            const leftType = spread.leftType || 'content';
            const rightType = spread.rightType || 'content';

            // Content-Seiten in .page-inner wrappen für vertikale Zentrierung
            // Cover/Chapter/Back-Cover nutzen absolute Positionierung, brauchen keinen Wrapper
            const wrapL = (leftType === 'content') ? `<div class="page-inner">${spread.left}</div>` : spread.left;
            const wrapR = (rightType === 'content') ? `<div class="page-inner">${spread.right}</div>` : spread.right;

            document.getElementById('bookSpread').innerHTML = `
                <div class="book-page left">
                    ${wrapL}
                    ${makeFooter(leftPage, leftType)}
                </div>
                <div class="book-page right">
                    ${wrapR}
                    ${makeFooter(rightPage, rightType)}
                </div>
            `;
            
            updateNav();
            updateProgress();
        }

        function updateNav() {
            const leftPage = (currentSpread * 2) + 1;
            const rightPage = Math.min((currentSpread * 2) + 2, totalPages);
            document.getElementById('pageInfo').textContent = `Seite ${leftPage}–${rightPage} von ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentSpread === 0;
            document.getElementById('nextBtn').disabled = currentSpread >= Math.ceil(totalPages / 2) - 1;
        }

        function updateProgress() {
            const total = Math.ceil(totalPages / 2);
            const progress = ((currentSpread + 1) / total) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function prevSpread() {
            if (currentSpread > 0) { currentSpread--; updateContent(); }
        }

        function nextSpread() {
            if (currentSpread < Math.ceil(totalPages / 2) - 1) { currentSpread++; updateContent(); }
        }

        // === Keyboard Navigation ===
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevSpread();
            if (e.key === 'ArrowRight') nextSpread();
            if (e.key === 'Home') { currentSpread = 0; updateContent(); }
            if (e.key === 'End') { currentSpread = Math.ceil(totalPages / 2) - 1; updateContent(); }
        });

        // === Init ===
        updateContent();
    </script>

    <!-- === PDF Export === -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
    async function exportPDF() {
        const btn = document.getElementById('pdfBtn');
        const status = document.getElementById('exportStatus');
        btn.disabled = true;
        btn.textContent = '...';
        
        const savedSpread = currentSpread;
        
        // Navigate to first spread to get page dimensions
        currentSpread = 0;
        updateContent();
        await new Promise(r => setTimeout(r, 150));
        
        const leftEl = document.querySelector('.book-page.left');
        const pw = leftEl.offsetWidth;
        const ph = leftEl.offsetHeight;
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [pw, ph] });
        
        const numSpreads = Math.ceil(totalPages / 2);
        let isFirst = true;
        
        for (let i = 0; i < numSpreads; i++) {
            currentSpread = i;
            updateContent();
            await new Promise(r => setTimeout(r, 200));
            
            status.textContent = Math.round(((i + 1) / numSpreads) * 100) + '%';
            
            // Left page
            const left = document.querySelector('.book-page.left');
            if (!isFirst) pdf.addPage([pw, ph], 'portrait');
            const lc = await html2canvas(left, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: null });
            pdf.addImage(lc.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pw, ph);
            isFirst = false;
            
            // Right page (skip if beyond totalPages)
            const rightPageNum = (i * 2) + 2;
            if (rightPageNum <= totalPages) {
                const right = document.querySelector('.book-page.right');
                pdf.addPage([pw, ph], 'portrait');
                const rc = await html2canvas(right, { scale: 2, useCORS: true, allowTaint: true, backgroundColor: null });
                pdf.addImage(rc.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pw, ph);
            }
        }
        
        // Restore original spread
        currentSpread = savedSpread;
        updateContent();
        
        pdf.save('[PDF_FILENAME].pdf'); // [PDF_FILENAME ersetzen]
        btn.disabled = false;
        btn.textContent = 'PDF ↓';
        status.textContent = '✓';
        setTimeout(() => { status.textContent = ''; }, 3000);
    }
    </script>
</body>
</html>
