<!-- ==========================================
     EXPORT PANEL – Für LinkedIn Carousel Produktion
     Dieses Snippet ans Ende des <body> einfügen
     ========================================== -->

<!-- CDN Dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Export Control Panel -->
<style>
    .export-panel {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1E1E20;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 9999;
        font-family: 'Noto Sans', sans-serif;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    
    .export-panel-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #CFCAB4;
        margin-bottom: 4px;
    }
    
    .export-btn {
        background: #FC2D01;
        color: #151416;
        border: none;
        padding: 12px 20px;
        font-family: 'Noto Sans', sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    
    .export-btn:hover {
        opacity: 0.9;
    }
    
    .export-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .export-btn.secondary {
        background: #333;
        color: #fff;
    }
    
    .export-status {
        font-size: 12px;
        color: #CFCAB4;
        min-height: 18px;
    }
</style>

<div class="export-panel">
    <div class="export-panel-title">Export</div>
    <button class="export-btn" onclick="exportPDF()">PDF für LinkedIn</button>
    <button class="export-btn secondary" onclick="exportPNGs()">Einzel-PNGs</button>
    <div class="export-status" id="exportStatus"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    
    // Slide-Dimensionen (fest für LinkedIn Carousel)
    const SLIDE_WIDTH = 540;
    const SLIDE_HEIGHT = 675;
    
    function setStatus(msg) {
        document.getElementById('exportStatus').textContent = msg;
    }
    
    async function renderSlide(slide, scale = 2) {
        return await html2canvas(slide, {
            scale: scale,
            useCORS: true,
            backgroundColor: null,
            width: SLIDE_WIDTH,
            height: SLIDE_HEIGHT
        });
    }
    
    async function exportPDF() {
        const slides = document.querySelectorAll('.slide');
        if (!slides.length) {
            setStatus('Keine Slides gefunden');
            return;
        }
        
        setStatus(`Generiere PDF (0/${slides.length})...`);
        
        // PDF mit Slide-Dimensionen in px (umgerechnet in mm)
        const pxToMm = 0.264583;
        const pdf = new jsPDF({
            orientation: 'portrait',
            unit: 'mm',
            format: [SLIDE_WIDTH * pxToMm, SLIDE_HEIGHT * pxToMm]
        });
        
        for (let i = 0; i < slides.length; i++) {
            setStatus(`Generiere PDF (${i + 1}/${slides.length})...`);
            
            if (i > 0) pdf.addPage();
            
            const canvas = await renderSlide(slides[i]);
            const imgData = canvas.toDataURL('image/png');
            
            pdf.addImage(imgData, 'PNG', 0, 0, SLIDE_WIDTH * pxToMm, SLIDE_HEIGHT * pxToMm);
        }
        
        // Dateiname aus Titel extrahieren oder Fallback
        const titleEl = document.querySelector('.slide .headline');
        let filename = 'carousel';
        if (titleEl) {
            filename = titleEl.textContent
                .trim()
                .substring(0, 40)
                .replace(/[^a-zA-Z0-9äöüÄÖÜß\s-]/g, '')
                .replace(/\s+/g, '-')
                .toLowerCase();
        }
        
        pdf.save(`${filename}.pdf`);
        setStatus('PDF gespeichert ✓');
    }
    
    async function exportPNGs() {
        const slides = document.querySelectorAll('.slide');
        if (!slides.length) {
            setStatus('Keine Slides gefunden');
            return;
        }
        
        setStatus(`Exportiere PNGs (0/${slides.length})...`);
        
        // Dateiname-Basis aus Titel
        const titleEl = document.querySelector('.slide .headline');
        let basename = 'slide';
        if (titleEl) {
            basename = titleEl.textContent
                .trim()
                .substring(0, 30)
                .replace(/[^a-zA-Z0-9äöüÄÖÜß\s-]/g, '')
                .replace(/\s+/g, '-')
                .toLowerCase();
        }
        
        for (let i = 0; i < slides.length; i++) {
            setStatus(`Exportiere PNGs (${i + 1}/${slides.length})...`);
            
            const canvas = await renderSlide(slides[i]);
            
            // Download triggern
            const link = document.createElement('a');
            link.download = `${basename}-${String(i + 1).padStart(2, '0')}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            // Kurze Pause zwischen Downloads (Browser-Throttling vermeiden)
            await new Promise(r => setTimeout(r, 300));
        }
        
        setStatus(`${slides.length} PNGs gespeichert ✓`);
    }
</script>
