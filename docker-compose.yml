# =============================================================================
# loschke-chat — EU/Local Deployment Stack
# =============================================================================
#
# Quick Start:
#   1. cp .env.eu.example .env
#   2. docker-compose up -d
#   3. docker-compose exec app node -e "require('./seeds/run-seed.js')"  (optional)
#   4. Open http://localhost:3000
#
# Services:
#   app       — Next.js Chat-Plattform
#   postgres  — PostgreSQL 17 Datenbank
#   minio     — S3-kompatibler Object Storage
#   searxng   — Self-hosted Websuche (optional)
#   mem0      — Memory Service (optional)

services:
  # ---------------------------------------------------------------------------
  # App — Next.js Chat Platform
  # ---------------------------------------------------------------------------
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://loschke:loschke@postgres:5432/loschke_chat?sslmode=disable
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=loschke-chat
      - S3_PUBLIC_DOMAIN=http://localhost:9000/loschke-chat
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # ---------------------------------------------------------------------------
  # PostgreSQL — Datenbank
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: loschke
      POSTGRES_PASSWORD: loschke
      POSTGRES_DB: loschke_chat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loschke -d loschke_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO — S3-kompatibler Object Storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO Console
    volumes:
      - minio_data:/data

  # ---------------------------------------------------------------------------
  # MinIO Bucket Setup (einmalig)
  # ---------------------------------------------------------------------------
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/loschke-chat --ignore-existing;
      mc anonymous set download local/loschke-chat;
      exit 0;
      "

  # ---------------------------------------------------------------------------
  # SearXNG — Self-hosted Websuche (optional)
  # ---------------------------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    profiles:
      - search

  # ---------------------------------------------------------------------------
  # Mem0 — Memory Service (optional)
  # ---------------------------------------------------------------------------
  mem0:
    image: mem0ai/mem0:latest
    ports:
      - "8080:8080"
    environment:
      - MEM0_BACKEND=postgres
      - DATABASE_URL=postgresql://loschke:loschke@postgres:5432/mem0
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - memory

volumes:
  postgres_data:
  minio_data:
  searxng_data:
